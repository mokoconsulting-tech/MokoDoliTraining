# FILE INFORMATION
# DEFGROUP: GitHub.Workflow.Template
# INGROUP: MokoStandards.CI
# REPO: https://github.com/mokoconsulting-tech/MokoStandards
# PATH: /templates/workflows/dolibarr/ci-dolibarr.yml
# VERSION: 04.03.00
# BRIEF: CI workflow for Dolibarr modules — lint, validate, test
# NOTE: Deployed to .github/workflows/ci-dolibarr.yml in governed Dolibarr module repos.

name: Dolibarr Module CI

on:
  push:
    branches:
      - main
      - dev/**
      - rc/**
      - version/**
  pull_request:
    branches:
      - main
      - dev/**
      - rc/**
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP
        uses: shivammathur/setup-php@fcafdd6392932010c2bd5094439b8e33be2a8a09 # v2.37.0
        with:
          php-version: '8.2'
          extensions: mbstring, xml, zip, gd, curl, json
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GH_TOKEN || github.token }}"}}'
        run: |
          composer install \
            --no-interaction \
            --prefer-dist \
            --optimize-autoloader

      - name: PHP syntax check
        run: |
          find src/ -name "*.php" -print0 \
            | xargs -0 -n1 php -l \
            | grep -v "No syntax errors" || true
          echo "### PHP Syntax" >> $GITHUB_STEP_SUMMARY
          echo "✅ No syntax errors detected" >> $GITHUB_STEP_SUMMARY

      - name: MokoStandards module validation
        run: |
          if [ -x "vendor/bin/validate-module" ]; then
            vendor/bin/validate-module --path . 2>&1 | tee /tmp/validate.log
            EXIT=${PIPESTATUS[0]}
          else
            echo "⏭️ validate-module not in vendor/bin — running from MokoStandards"
            php /tmp/mokostandards/bin/validate-module --path . 2>&1 | tee /tmp/validate.log
            EXIT=${PIPESTATUS[0]}
          fi
          echo "### Module Validation" >> $GITHUB_STEP_SUMMARY
          if [ $EXIT -eq 0 ]; then
            echo "✅ All validation checks passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Validation failures — see log below" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat /tmp/validate.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          exit $EXIT

      - name: PHP CodeSniffer
        run: |
          if [ -f "phpcs.xml" ]; then
            vendor/bin/phpcs --standard=phpcs.xml src/ || true
          else
            vendor/bin/phpcs \
              --standard=vendor/mokoconsulting-tech/enterprise/phpcs.xml \
              src/ || true
          fi

      - name: PHPStan static analysis
        run: |
          if [ -f "phpstan.neon" ]; then
            vendor/bin/phpstan analyse -c phpstan.neon src/ || true
          else
            vendor/bin/phpstan analyse \
              -c vendor/mokoconsulting-tech/enterprise/phpstan.neon \
              src/ || true
          fi

  release-readiness:
    name: Release Readiness Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate module descriptor version
        run: |
          echo "## 📦 Release Readiness" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ERRORS=0

          # Extract version from README.md
          README_VERSION=$(grep -oP '^\s*VERSION:\s*\K[0-9]{2}\.[0-9]{2}\.[0-9]{2}' README.md | head -1)
          if [ -z "$README_VERSION" ]; then
            echo "❌ No VERSION found in README.md FILE INFORMATION block" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          else
            echo "✅ README version: \`${README_VERSION}\`" >> $GITHUB_STEP_SUMMARY
          fi

          # Check module descriptor exists and has a version
          MOD_FILE=$(find src -path "*/core/modules/mod*.class.php" -print -quit 2>/dev/null)
          if [ -z "$MOD_FILE" ]; then
            echo "❌ No module descriptor found (src/core/modules/mod*.class.php)" >> $GITHUB_STEP_SUMMARY
            ERRORS=$((ERRORS + 1))
          else
            MOD_VERSION=$(grep -oP "\\\$this->version\s*=\s*['\"]\\K[^'\"]*" "$MOD_FILE" | head -1)
            echo "✅ Module descriptor: \`${MOD_FILE}\`" >> $GITHUB_STEP_SUMMARY

            # On dev branches, version should be 'development' — on PRs to main it should match README
            if [ "$MOD_VERSION" = "development" ]; then
              echo "ℹ️ Module version is \`development\` — auto-release will update to \`${README_VERSION}\` on merge" >> $GITHUB_STEP_SUMMARY
            elif [ "$MOD_VERSION" != "$README_VERSION" ] && [ -n "$README_VERSION" ]; then
              echo "⚠️ Module version \`${MOD_VERSION}\` differs from README \`${README_VERSION}\` — auto-release will fix this on merge" >> $GITHUB_STEP_SUMMARY
            else
              echo "✅ Module version: \`${MOD_VERSION}\`" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          # Check CHANGELOG.md exists and has content
          if [ -f "CHANGELOG.md" ] || [ -f "src/ChangeLog.md" ]; then
            echo "✅ Changelog present" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No CHANGELOG.md found — consider adding one" >> $GITHUB_STEP_SUMMARY
          fi

          # Check module_number is set (Dolibarr module ID)
          if [ -n "$MOD_FILE" ]; then
            MOD_NUMBER=$(grep -oP "module_number\s*=\s*\\K[0-9]+" "$MOD_FILE" 2>/dev/null || \
                         grep -oP "\\\$this->numero\s*=\s*\\K[0-9]+" "$MOD_FILE" 2>/dev/null)
            if [ -n "$MOD_NUMBER" ] && [ "$MOD_NUMBER" -gt 0 ] 2>/dev/null; then
              echo "✅ Module number: \`${MOD_NUMBER}\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Module number not set or is 0 — request one via issue template" >> $GITHUB_STEP_SUMMARY
              ERRORS=$((ERRORS + 1))
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          if [ $ERRORS -gt 0 ]; then
            echo "**${ERRORS} issue(s) must be resolved before release.**" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "**✅ Module is ready for release.**" >> $GITHUB_STEP_SUMMARY
          fi

  test:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint-and-validate

    strategy:
      fail-fast: false
      matrix:
        php: ['8.1', '8.2', '8.3']

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@fcafdd6392932010c2bd5094439b8e33be2a8a09 # v2.37.0
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, zip, gd, curl, json
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        env:
          COMPOSER_AUTH: '{"github-oauth":{"github.com":"${{ secrets.GH_TOKEN || github.token }}"}}'
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run tests
        run: |
          if [ -f "phpunit.xml" ] || [ -f "phpunit.xml.dist" ]; then
            vendor/bin/phpunit --testdox
          else
            echo "No phpunit.xml found — skipping tests"
          fi
