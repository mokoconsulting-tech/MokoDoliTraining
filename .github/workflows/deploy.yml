# ──────────────────────────────────────────────────────────────────────────────
# deploy.yml -- Auto-deploy src/ to Dreamhost via SFTP on push
#
# Triggers on pushes to main that change files under src/.
# Uses lftp mirror to sync src/ to the remote server,
# uploading new/changed files and deleting files removed from src/.
#
# Required GitHub Secrets:
#   DEV_FTP_HOST        -- hostname, optionally with port: host or host:port
#   DEV_FTP_USERNAME    -- SFTP/FTP username
#   DEV_FTP_PASSWORD    -- password (used if DEV_FTP_KEY is not set)
#   DEV_FTP_KEY         -- SSH private key in OpenSSH format (preferred over password)
#   DEV_FTP_PATH        -- base remote path (e.g. /home/user/htdocs/custom/)
#   DEV_FTP_PATH_SUFFIX -- appended to DEV_FTP_PATH (e.g. mokodolitraining/)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to Dreamhost

on:
  push:
    branches: [main]
    paths: ['src/**']

jobs:
  deploy:
    name: SFTP Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Resolve host and port
        id: conn
        run: |
          RAW_HOST="${{ secrets.DEV_FTP_HOST }}"
          # Split host:port if colon present, otherwise default to 22
          if [[ "$RAW_HOST" == *:* ]]; then
            HOST="${RAW_HOST%%:*}"
            PORT="${RAW_HOST##*:}"
          else
            HOST="$RAW_HOST"
            PORT="22"
          fi
          REMOTE_PATH="${{ secrets.DEV_FTP_PATH }}${{ secrets.DEV_FTP_PATH_SUFFIX }}"
          echo "host=$HOST"        >> "$GITHUB_OUTPUT"
          echo "port=$PORT"        >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE_PATH" >> "$GITHUB_OUTPUT"

      - name: Write SSH key (if provided)
        if: ${{ secrets.DEV_FTP_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_FTP_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ steps.conn.outputs.port }} ${{ steps.conn.outputs.host }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync src/ to remote (key auth)
        if: ${{ secrets.DEV_FTP_KEY != '' }}
        run: |
          lftp -c "
            set sftp:connect-program 'ssh -i ~/.ssh/deploy_key -p ${{ steps.conn.outputs.port }} -o StrictHostKeyChecking=accept-new';
            open sftp://${{ secrets.DEV_FTP_USERNAME }}@${{ steps.conn.outputs.host }};
            mirror --reverse --delete --verbose \
              --exclude ^sftp-config \
              --exclude ^\.git \
              --exclude ^\.DS_Store \
              --exclude ^conf\.php \
              src/ ${{ steps.conn.outputs.remote }};
            bye
          "

      - name: Sync src/ to remote (password auth)
        if: ${{ secrets.DEV_FTP_KEY == '' }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            open sftp://${{ secrets.DEV_FTP_USERNAME }}:${{ secrets.DEV_FTP_PASSWORD }}@${{ steps.conn.outputs.host }}:${{ steps.conn.outputs.port }};
            mirror --reverse --delete --verbose \
              --exclude ^sftp-config \
              --exclude ^\.git \
              --exclude ^\.DS_Store \
              --exclude ^conf\.php \
              src/ ${{ steps.conn.outputs.remote }};
            bye
          "

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
