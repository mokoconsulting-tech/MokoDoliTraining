# ──────────────────────────────────────────────────────────────────────────────
# deploy-dev.yml -- Deploy to Dev server via SFTP on push to main
#
# Auth priority:
#   1. Key + Password  → decrypt key passphrase with password, use key for SFTP
#                        if decryption fails → fall back to password SFTP auth
#   2. Key only        → use key as-is (assumes no passphrase)
#   3. Password only   → use password for SFTP auth
#
# Required GitHub Secrets:
#   DEV_FTP_HOST        -- hostname, optionally with port: host or host:port
#   DEV_FTP_USERNAME    -- SFTP username
#   DEV_FTP_PASSWORD    -- password / key passphrase (optional)
#   DEV_FTP_KEY         -- SSH private key in OpenSSH format (optional)
#   DEV_FTP_PATH        -- base remote path (e.g. /home/user/htdocs/custom/)
#   DEV_FTP_PATH_SUFFIX -- appended to DEV_FTP_PATH (e.g. mokodolitraining/)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to Dev

on:
  push:
    branches: [main]
    paths: ['src/**']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would be synced without transferring files'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  deploy:
    name: SFTP Sync
    runs-on: ubuntu-latest

    env:
      # Sensitive — stored as GitHub Secrets
      DEV_FTP_KEY:      ${{ secrets.DEV_FTP_KEY }}
      DEV_FTP_PASSWORD: ${{ secrets.DEV_FTP_PASSWORD }}
      # Non-sensitive — stored as GitHub Variables (vars.*)
      DEV_FTP_HOST:        ${{ vars.DEV_FTP_HOST }}
      DEV_FTP_USERNAME:    ${{ vars.DEV_FTP_USERNAME }}
      DEV_FTP_PATH:        ${{ vars.DEV_FTP_PATH }}
      DEV_FTP_PATH_SUFFIX: ${{ vars.DEV_FTP_PATH_SUFFIX }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Resolve connection and auth
        id: conn
        run: |
          # ── Host / port ────────────────────────────────────────────────────
          if [[ "$DEV_FTP_HOST" == *:* ]]; then
            HOST="${DEV_FTP_HOST%%:*}"
            PORT="${DEV_FTP_HOST##*:}"
          else
            HOST="$DEV_FTP_HOST"
            PORT="22"
          fi

          # ── Remote path ────────────────────────────────────────────────────
          # Trim trailing slash from PATH, leading slash from SUFFIX, rejoin cleanly
          BASE="${DEV_FTP_PATH%/}"
          SUFFIX="${DEV_FTP_PATH_SUFFIX#/}"
          REMOTE_PATH="${BASE}/${SUFFIX}"

          # ── Dry-run flag ───────────────────────────────────────────────────
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          DRY_FLAG=""
          if [[ "$DRY_RUN" == "true" ]]; then
            DRY_FLAG="--dry-run"
            echo "::notice::DRY RUN — no files will be transferred"
          fi

          # ── Auth: resolve method ───────────────────────────────────────────
          # Outcomes written to GITHUB_OUTPUT:
          #   auth_method = key | password
          #   key_path    = path to unprotected key file (key auth only)
          AUTH_METHOD="password"

          if [[ -n "$DEV_FTP_KEY" ]]; then
            mkdir -p ~/.ssh
            echo "$DEV_FTP_KEY" > ~/.ssh/deploy_key
            chmod 600 ~/.ssh/deploy_key

            if [[ -n "$DEV_FTP_PASSWORD" ]]; then
              # Try to strip passphrase from key using password
              if ssh-keygen -p -P "$DEV_FTP_PASSWORD" -N "" -f ~/.ssh/deploy_key &>/dev/null; then
                echo "::notice::Key passphrase decrypted — using key auth"
                AUTH_METHOD="key"
              else
                echo "::warning::Key passphrase decryption failed — falling back to password auth"
                rm -f ~/.ssh/deploy_key
                AUTH_METHOD="password"
              fi
            else
              # Key only, no password — use key as-is (assumed no passphrase)
              echo "::notice::No password provided — using key auth as-is"
              AUTH_METHOD="key"
            fi
          fi

          if [[ "$AUTH_METHOD" == "key" ]]; then
            ssh-keyscan -p "$PORT" "$HOST" >> ~/.ssh/known_hosts 2>/dev/null
          fi

          echo "host=$HOST"            >> "$GITHUB_OUTPUT"
          echo "port=$PORT"            >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE_PATH"   >> "$GITHUB_OUTPUT"
          echo "dry_flag=$DRY_FLAG"    >> "$GITHUB_OUTPUT"
          echo "auth_method=$AUTH_METHOD" >> "$GITHUB_OUTPUT"

      - name: Sync src/ to remote (key auth)
        if: steps.conn.outputs.auth_method == 'key'
        run: |
          lftp -c "
            set sftp:connect-program 'ssh -i ~/.ssh/deploy_key -p ${{ steps.conn.outputs.port }} -o StrictHostKeyChecking=accept-new';
            open sftp://${DEV_FTP_USERNAME}@${{ steps.conn.outputs.host }};
            mirror --reverse --delete --verbose ${{ steps.conn.outputs.dry_flag }} \
              --exclude ^sftp-config \
              --exclude ^\.git \
              --exclude ^\.DS_Store \
              --exclude ^conf\.php \
              src/ ${{ steps.conn.outputs.remote }};
            bye
          "

      - name: Sync src/ to remote (password auth)
        if: steps.conn.outputs.auth_method == 'password'
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            open sftp://${DEV_FTP_USERNAME}:${DEV_FTP_PASSWORD}@${{ steps.conn.outputs.host }}:${{ steps.conn.outputs.port }};
            mirror --reverse --delete --verbose ${{ steps.conn.outputs.dry_flag }} \
              --exclude ^sftp-config \
              --exclude ^\.git \
              --exclude ^\.DS_Store \
              --exclude ^conf\.php \
              src/ ${{ steps.conn.outputs.remote }};
            bye
          "

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
