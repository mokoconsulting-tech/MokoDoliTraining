# ──────────────────────────────────────────────────────────────────────────────
# deploy-dev.yml -- Deploy to Dev server via SFTP on push to main
#
# Triggers automatically on push to main when src/ files change.
# Can also be triggered manually via workflow_dispatch with a dry_run option.
#
# Required GitHub Secrets:
#   DEV_FTP_HOST        -- hostname, optionally with port: host or host:port
#   DEV_FTP_USERNAME    -- SFTP username
#   DEV_FTP_PASSWORD    -- password (used when DEV_FTP_KEY is not set)
#   DEV_FTP_KEY         -- SSH private key in OpenSSH format (preferred)
#   DEV_FTP_PATH        -- base remote path (e.g. /home/user/htdocs/custom/)
#   DEV_FTP_PATH_SUFFIX -- appended to DEV_FTP_PATH (e.g. mokodolitraining/)
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to Dev

on:
  push:
    branches: [main]
    paths: ['src/**']
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — show what would be synced without transferring files'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  deploy:
    name: SFTP Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Resolve host, port, and remote path
        id: conn
        run: |
          RAW_HOST="${{ secrets.DEV_FTP_HOST }}"
          # Split host:port if colon is present, otherwise default port to 22
          if [[ "$RAW_HOST" == *:* ]]; then
            HOST="${RAW_HOST%%:*}"
            PORT="${RAW_HOST##*:}"
          else
            HOST="$RAW_HOST"
            PORT="22"
          fi
          REMOTE_PATH="${{ secrets.DEV_FTP_PATH }}${{ secrets.DEV_FTP_PATH_SUFFIX }}"
          echo "host=$HOST"          >> "$GITHUB_OUTPUT"
          echo "port=$PORT"          >> "$GITHUB_OUTPUT"
          echo "remote=$REMOTE_PATH" >> "$GITHUB_OUTPUT"
          # Dry run flag: set by manual dispatch input, or false on auto push
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          if [[ "$DRY_RUN" == "true" ]]; then
            echo "dry_flag=--dry-run" >> "$GITHUB_OUTPUT"
            echo "::notice::DRY RUN — no files will be transferred"
          else
            echo "dry_flag="          >> "$GITHUB_OUTPUT"
          fi

      - name: Write SSH key (if provided)
        if: ${{ secrets.DEV_FTP_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEV_FTP_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ steps.conn.outputs.port }} ${{ steps.conn.outputs.host }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync src/ to remote (key auth)
        if: ${{ secrets.DEV_FTP_KEY != '' }}
        run: |
          lftp -c "
            set sftp:connect-program 'ssh -i ~/.ssh/deploy_key -p ${{ steps.conn.outputs.port }} -o StrictHostKeyChecking=accept-new';
            open sftp://${{ secrets.DEV_FTP_USERNAME }}@${{ steps.conn.outputs.host }};
            mirror --reverse --delete --verbose ${{ steps.conn.outputs.dry_flag }} \
              --exclude ^sftp-config \
              --exclude ^\.git \
              --exclude ^\.DS_Store \
              --exclude ^conf\.php \
              src/ ${{ steps.conn.outputs.remote }};
            bye
          "

      - name: Sync src/ to remote (password auth)
        if: ${{ secrets.DEV_FTP_KEY == '' }}
        run: |
          lftp -c "
            set ftp:ssl-allow yes;
            set ssl:verify-certificate no;
            open sftp://${{ secrets.DEV_FTP_USERNAME }}:${{ secrets.DEV_FTP_PASSWORD }}@${{ steps.conn.outputs.host }}:${{ steps.conn.outputs.port }};
            mirror --reverse --delete --verbose ${{ steps.conn.outputs.dry_flag }} \
              --exclude ^sftp-config \
              --exclude ^\.git \
              --exclude ^\.DS_Store \
              --exclude ^conf\.php \
              src/ ${{ steps.conn.outputs.remote }};
            bye
          "

      - name: Clean up SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
